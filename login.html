<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cursos com Curso</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
        }
        .login-card {
            max-width: 400px;
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            background: white;
            padding: 2rem;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-primary"><i class="bi bi-mortarboard-fill me-2"></i>Cursos com Curso</h2>
            <p class="text-muted">Acesso à plataforma</p>
        </div>

        <!-- Abas Login / Cadastro -->
        <ul class="nav nav-pills mb-3 justify-content-center" id="pills-tab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="pills-login-tab" data-bs-toggle="pill" data-bs-target="#pills-login" type="button" role="tab">Entrar</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="pills-register-tab" data-bs-toggle="pill" data-bs-target="#pills-register" type="button" role="tab">Cadastrar</button>
            </li>
        </ul>

        <div class="tab-content" id="pills-tabContent">
            <!-- TAB LOGIN -->
            <div class="tab-pane fade show active" id="pills-login" role="tabpanel">
                <div id="login-error" class="alert alert-danger d-none" role="alert">
                    E-mail ou senha inválidos!
                </div>
                <form id="form-login">
                    <div class="mb-3">
                        <label for="login-email" class="form-label fw-bold">E-mail</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="bi bi-envelope-fill"></i></span>
                            <input type="email" class="form-control" id="login-email" placeholder="admin@formapro.com" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="login-senha" class="form-label fw-bold">Senha</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="bi bi-lock-fill"></i></span>
                            <input type="password" class="form-control" id="login-senha" placeholder="123456" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold pulse-hover">Entrar</button>
                </form>
            </div>

            <!-- TAB CADASTRO -->
            <div class="tab-pane fade" id="pills-register" role="tabpanel">
                <div id="register-success" class="alert alert-success d-none" role="alert">
                    Cadastro realizado com sucesso! Faça login.
                </div>
                <form id="form-register">
                    <div class="mb-3">
                        <label for="reg-nome" class="form-label fw-bold">Nome Completo</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="bi bi-person-fill"></i></span>
                            <input type="text" class="form-control" id="reg-nome" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="reg-email" class="form-label fw-bold">E-mail</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="bi bi-envelope-fill"></i></span>
                            <input type="email" class="form-control" id="reg-email" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="reg-senha" class="form-label fw-bold">Senha</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="bi bi-lock-fill"></i></span>
                            <input type="password" class="form-control" id="reg-senha" required minlength="6">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2 fw-bold pulse-hover">Registrar-se</button>
                </form>
            </div>
        </div>
        
        <div class="mt-4 text-center text-muted small border-top pt-3">
            <p>Dicas de Acesso: admin@formapro.com (Admin) | aluno@formapro.com (Aluno) | Senha: 123456</p>
            <a href="vitrine_publica.html" class="text-decoration-none fw-bold text-success"><i class="bi bi-shop"></i> Ver Cursos e Planos (Visita)</a>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Entry module -->
    <script type="module" src="controller/LoginController.mjs"></script>
</body>
</html>
